services:
  rclone:
    image: ghcr.io/rclone/rclone:1.74.4
    restart: unless-stopped
    entrypoint: []
    command:
      - /entrypoint.sh
    environment:
      - S3_ENDPOINT=${ENDPOINT}
      - S3_ACCESS_KEY=${ACCESS_KEY}
      - S3_SECRET_KEY=${SECRET_KEY}
      - NTFY_TOKEN=${NTFY_TOKEN}
    volumes:
      - rclone:/scripts/data
      - ${PWD}/entrypoint.sh:/entrypoint.sh:ro
      - ${PWD}/backup.sh:/scripts/backup.sh:ro
      - /etc/hostname:/scripts/hostname:ro
      - /var/lib/docker/volumes:/data:ro
    extra_hosts:
      - s3.chamburr.xyz:10.0.0.1
      - ntfy.chamburr.xyz:10.0.0.1

volumes:
  rclone:
